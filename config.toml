[paths]
data_dir = "data"
generated_dir = "generated"
images_dir = "data/images"
ground_truth_raw_dir = "data/ground_truth_raw"
predicted_masks_raw_dir = "generated/predicted_masks_raw"
predicted_masks_binary_dir = "generated/predicted_masks_binary"
ground_truth_binary_dir = "generated/ground_truth_binary"
evaluation_dir = "generated/evaluation"
indice_file = "data/Indice.xlsx"
sqlite_file = "generated/bufalos.sqlite3"

[columns]
nome = "nome do arquivo"
fazenda = "fazenda"
peso = "peso"
tags = "tags"

[file_types]
images = ".jpg"
# Docs: decisoes-tecnicas/formato-das-mascaras.md
rembg = ".png"

[binarization]
sigma = 1.0
threshold = 127
kernel_size = 3

[models]
u2net = "gpu"
u2netp = "gpu"
u2net_human_seg = "gpu"
# Docs: decisoes-tecnicas/u2net-cloth-seg.md
# u2net_cloth_seg = "gpu"
silueta = "gpu"
isnet-general-use = "gpu"
isnet-anime = "gpu"
sam = "gpu"
birefnet-general = "cpu"
birefnet-general-lite = "cpu"
birefnet-portrait = "cpu"
birefnet-dis = "cpu"
birefnet-hrsod = "cpu"
birefnet-cod = "cpu"
birefnet-massive = "cpu"

[evaluation.ranking_weights]
iou = 0.34
area_similarity = 0.33
perimetro_similarity = 0.33
